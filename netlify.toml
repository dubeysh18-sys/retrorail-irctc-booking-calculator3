[build]
  # Build command
  command = "bun run build"
  
  # Directory with the build output (Cloudflare plugin outputs to dist/client)
  publish = "dist/client"

# Redirect all requests to index.html for SPA routing (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Optional: Set custom headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
